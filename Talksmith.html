<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Talksmith — Meeting Assistant</title>
<style>
/* Talksmith — Meeting assistant design system */
@import url('https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap');

:root {
  /* Dark mode (default, meeting-friendly) */
  --bg-0: oklch(0.16 0.005 260);        /* app background */
  --bg-1: oklch(0.19 0.006 260);        /* panel */
  --bg-2: oklch(0.22 0.007 260);        /* raised card */
  --bg-3: oklch(0.26 0.008 260);        /* hover */
  --bg-inset: oklch(0.14 0.005 260);    /* inset / transcript */

  --line: oklch(0.28 0.008 260 / 0.8);
  --line-strong: oklch(0.34 0.01 260 / 1);
  --line-soft: oklch(0.24 0.007 260 / 0.7);

  --ink-0: oklch(0.97 0.003 260);       /* primary text */
  --ink-1: oklch(0.82 0.006 260);       /* secondary */
  --ink-2: oklch(0.64 0.008 260);       /* tertiary */
  --ink-3: oklch(0.48 0.008 260);       /* placeholder */

  --blue: oklch(0.72 0.14 250);
  --blue-soft: oklch(0.72 0.14 250 / 0.15);
  --blue-line: oklch(0.72 0.14 250 / 0.35);

  --amber: oklch(0.80 0.14 75);
  --amber-soft: oklch(0.80 0.14 75 / 0.14);
  --amber-line: oklch(0.80 0.14 75 / 0.35);

  --rose: oklch(0.70 0.18 18);
  --rose-soft: oklch(0.70 0.18 18 / 0.15);
  --rose-line: oklch(0.70 0.18 18 / 0.4);

  --green: oklch(0.78 0.12 160);
  --green-soft: oklch(0.78 0.12 160 / 0.14);

  --accent: var(--blue);

  --radius-sm: 6px;
  --radius: 10px;
  --radius-lg: 14px;

  --shadow-pop: 0 1px 0 rgba(255,255,255,0.04) inset, 0 8px 30px rgba(0,0,0,0.35);
  --shadow-card: 0 1px 0 rgba(255,255,255,0.03) inset, 0 1px 2px rgba(0,0,0,0.3);

  --font-sans: 'Geist', ui-sans-serif, system-ui, sans-serif;
  --font-mono: 'Geist Mono', ui-monospace, Menlo, monospace;

  --speed: 180ms;
  --ease: cubic-bezier(0.2, 0.8, 0.2, 1);
}

[data-theme="light"] {
  --bg-0: oklch(0.985 0.003 260);
  --bg-1: oklch(0.97 0.004 260);
  --bg-2: oklch(1 0 0);
  --bg-3: oklch(0.95 0.005 260);
  --bg-inset: oklch(0.965 0.004 260);
  --line: oklch(0.88 0.006 260);
  --line-strong: oklch(0.82 0.008 260);
  --line-soft: oklch(0.92 0.005 260);
  --ink-0: oklch(0.20 0.008 260);
  --ink-1: oklch(0.38 0.008 260);
  --ink-2: oklch(0.52 0.008 260);
  --ink-3: oklch(0.68 0.006 260);
  --blue: oklch(0.55 0.17 250);
  --blue-soft: oklch(0.55 0.17 250 / 0.08);
  --blue-line: oklch(0.55 0.17 250 / 0.25);
  --amber: oklch(0.62 0.15 70);
  --amber-soft: oklch(0.62 0.15 70 / 0.09);
  --amber-line: oklch(0.62 0.15 70 / 0.3);
  --rose: oklch(0.55 0.20 18);
  --rose-soft: oklch(0.55 0.20 18 / 0.08);
  --rose-line: oklch(0.55 0.20 18 / 0.3);
  --green: oklch(0.55 0.14 160);
  --green-soft: oklch(0.55 0.14 160 / 0.09);
  --shadow-pop: 0 1px 0 rgba(255,255,255,1) inset, 0 8px 30px rgba(15,20,30,0.1);
  --shadow-card: 0 1px 2px rgba(15,20,30,0.04);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-sans);
  background: var(--bg-0);
  color: var(--ink-0);
  font-size: 13px;
  line-height: 1.5;
  letter-spacing: -0.005em;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  font-feature-settings: "ss01", "cv11";
}

button { font-family: inherit; color: inherit; }
::selection { background: var(--blue-soft); }

/* scrollbars */
.scroll::-webkit-scrollbar { width: 8px; height: 8px; }
.scroll::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 4px; }
.scroll::-webkit-scrollbar-track { background: transparent; }
.scroll { scrollbar-width: thin; scrollbar-color: var(--line-strong) transparent; }

/* util */
.mono { font-family: var(--font-mono); font-feature-settings: "tnum", "zero"; }
.eyebrow {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  color: var(--ink-2);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

/* animations */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeOut {
  to { opacity: 0; transform: translateY(-4px); }
}
@keyframes pulseEdge {
  0%, 100% { opacity: 0.0; }
  50%      { opacity: 1; }
}
@keyframes pulseDot {
  0%, 100% { opacity: 0.6; transform: scale(1); }
  50%      { opacity: 1;   transform: scale(1.15); }
}
@keyframes breathe {
  0%, 100% { opacity: 0.55; }
  50%      { opacity: 1; }
}
@keyframes levelBar {
  0%, 100% { transform: scaleY(0.35); }
  50%      { transform: scaleY(1); }
}
@keyframes shimmer {
  0% { background-position: -200px 0; }
  100% { background-position: 200px 0; }
}

/* Honor OS-level motion preference. The pulse/edge/breathe loops carry
   information (active state, high alert) but the motion itself isn't
   essential — flatten to a still state for users who opt out. */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.001ms !important;
    animation-iteration-count: 1 !important;
    animation-delay: 0ms !important;
    transition-duration: 0.001ms !important;
    scroll-behavior: auto !important;
  }
}

/* Keyboard focus ring. Many of our buttons are icon-only and rely on inline
   styles, so a single focus-visible rule covers them all without per-button
   work. Inset to read on both --bg-1 panels and --bg-inset rails. */
:focus { outline: none; }
button:focus-visible,
[role="button"]:focus-visible,
[tabindex]:focus-visible {
  outline: 2px solid var(--blue);
  outline-offset: 2px;
  border-radius: 4px;
}

/* Containment: each scrolling panel is its own layout/paint root. A new
   transcript line or a dynamics tick can't invalidate layout in the rest
   of the app. Cheap to add, real win when a meeting is active. */
.scroll { contain: layout style paint; }

/* Boot skeleton — visible before React mounts so the first paint isn't a
   white flash. React's createRoot replaces #root's children, removing this. */
.ts-boot {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 14px;
  background: var(--bg-0); color: var(--ink-1);
  font-family: var(--font-sans);
}
.ts-boot__mark {
  font-size: 15px; font-weight: 600; letter-spacing: -0.01em;
  color: var(--ink-0);
}
.ts-boot__bar {
  width: 120px; height: 2px;
  background: var(--line); border-radius: 2px; overflow: hidden;
  position: relative;
}
.ts-boot__bar::after {
  content: ""; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, var(--blue), transparent);
  animation: tsBootSlide 1.4s ease-in-out infinite;
}
.ts-boot__hint { font-size: 11px; color: var(--ink-3); font-family: var(--font-mono); }
@keyframes tsBootSlide {
  0%   { transform: translateX(-100%); }
  100% { transform: translateX(100%);  }
}

</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root">
  <div class="ts-boot" aria-hidden="true">
    <div class="ts-boot__mark">Talksmith</div>
    <div class="ts-boot__bar"></div>
    <div class="ts-boot__hint">tuning the coaches…</div>
  </div>
</div>

<script type="text/babel" data-presets="react">

// === components/Icons.jsx ===
// Icons.jsx — minimal line icons for Talksmith
const Icon = ({ d, size = 14, stroke = 1.5, style = {} }) => (
  <svg width={size} height={size} viewBox="0 0 16 16" fill="none"
       stroke="currentColor" strokeWidth={stroke}
       strokeLinecap="round" strokeLinejoin="round" style={style}>
    {d}
  </svg>
);

const Icons = {
  mic:       <path d="M8 1.5a2 2 0 012 2v4a2 2 0 01-4 0v-4a2 2 0 012-2zM4 7.5a4 4 0 008 0M8 11.5v3M5.5 14.5h5" />,
  play:      <path d="M4 3l9 5-9 5V3z" fill="currentColor" stroke="none" />,
  pause:     <><rect x="4" y="3" width="3" height="10" fill="currentColor" stroke="none"/><rect x="9" y="3" width="3" height="10" fill="currentColor" stroke="none"/></>,
  stop:      <rect x="4" y="4" width="8" height="8" fill="currentColor" stroke="none"/>,
  chev:      <path d="M6 3l4 5-4 5" />,
  chevDown:  <path d="M3 6l5 4 5-4" />,
  chevUp:    <path d="M3 10l5-4 5 4" />,
  x:         <path d="M4 4l8 8M12 4l-8 8" />,
  check:     <path d="M3 8.5l3 3 7-7" />,
  copy:      <><rect x="5" y="5" width="9" height="9" rx="1.5"/><path d="M11 5V3a1 1 0 00-1-1H3a1 1 0 00-1 1v7a1 1 0 001 1h2"/></>,
  dot:       <circle cx="8" cy="8" r="2" fill="currentColor" stroke="none"/>,
  sparkle:   <path d="M8 2v4M8 10v4M2 8h4M10 8h4M4 4l2.5 2.5M9.5 9.5L12 12M12 4L9.5 6.5M6.5 9.5L4 12"/>,
  wave:      <path d="M1 8c1-3 2-3 3 0s2 3 3 0 2-3 3 0 2 3 3 0"/>,
  clock:     <><circle cx="8" cy="8" r="6"/><path d="M8 4.5v4l2.5 1.5"/></>,
  cal:       <><rect x="2" y="3" width="12" height="11" rx="1.5"/><path d="M5 1.5v3M11 1.5v3M2 6.5h12"/></>,
  user:      <><circle cx="8" cy="6" r="2.5"/><path d="M3 14c0-2.8 2.2-5 5-5s5 2.2 5 5"/></>,
  users:     <><circle cx="6" cy="6" r="2.5"/><path d="M1.5 14c0-2.8 2-4.5 4.5-4.5s4.5 1.7 4.5 4.5"/><circle cx="12" cy="5.5" r="2" /><path d="M10.5 14c0-2.5 1.5-4 3-4"/></>,
  keyboard:  <><rect x="1.5" y="3.5" width="13" height="9" rx="1.5"/><path d="M4 7h.01M7 7h.01M10 7h.01M13 7h.01M4 10h8"/></>,
  bell:      <path d="M4 11c0-4 1.5-6 4-6s4 2 4 6h1v1H3v-1h1zM6.5 13.5a1.5 1.5 0 003 0"/>,
  bellOff:   <><path d="M4 11c0-4 1.5-6 4-6s4 2 4 6h1v1H3v-1h1zM6.5 13.5a1.5 1.5 0 003 0"/><path d="M2 2l12 12"/></>,
  settings:  <><circle cx="8" cy="8" r="2.5"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3 3l1.5 1.5M11.5 11.5L13 13M13 3l-1.5 1.5M4.5 11.5L3 13"/></>,
  search:    <><circle cx="7" cy="7" r="4"/><path d="M10 10l3.5 3.5"/></>,
  expand:    <path d="M3 6V3h3M10 3h3v3M13 10v3h-3M6 13H3v-3"/>,
  minimize:  <path d="M6 3v3H3M10 3v3h3M10 13v-3h3M6 13v-3H3"/>,
  trendUp:   <path d="M2 11l4-4 3 3 5-6M10 4h4v4"/>,
  arrow:     <path d="M3 8h10M9 4l4 4-4 4"/>,
  home:      <path d="M2 8l6-5 6 5v6H9v-4H7v4H2V8z"/>,
  pulse:     <path d="M1 8h3l1.5-4 2 8 1.5-4h6"/>,
  list:      <path d="M3 4h10M3 8h10M3 12h10"/>,
  circle:    <circle cx="8" cy="8" r="5.5"/>,
  interrupt: <path d="M3 4l4 4-4 4M8 3v10M13 4l-4 4 4 4"/>,
  flag:      <path d="M3 1v13M3 2h9l-2 3 2 3H3"/>,
  goal:      <><circle cx="8" cy="8" r="6"/><circle cx="8" cy="8" r="3"/><circle cx="8" cy="8" r="1" fill="currentColor" stroke="none"/></>,
  info:      <><circle cx="8" cy="8" r="6"/><path d="M8 7.5v4M8 5v.01"/></>,
  snooze:    <><circle cx="8" cy="8" r="6"/><path d="M6 6h4l-4 4h4"/></>,
  moon:      <path d="M13 9.5A5 5 0 017.5 3a1 1 0 00-1-1.3 6 6 0 107.9 7.9 1 1 0 00-1.4-1z"/>,
  sun:       <><circle cx="8" cy="8" r="3"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3 3l1.5 1.5M11.5 11.5L13 13M13 3l-1.5 1.5M4.5 11.5L3 13"/></>,
};

const I = (name, props = {}) => <Icon d={Icons[name]} {...props} />;

window.I = I;
window.Icons = Icons;


// === components/Primitives.jsx ===
// Primitives.jsx — shared UI atoms
const appStyles = {
  chrome: {
    height: '100vh', width: '100vw',
    background: 'var(--bg-0)',
    display: 'flex', flexDirection: 'column',
    color: 'var(--ink-0)',
  },
};

// Title bar — custom app window chrome (not macOS; our own)
function TitleBar({ title, subtitle, meetingState, onSettings, activeScreen, onScreenChange }) {
  const screens = [
    { id: 'live', label: 'Live', key: '1' },
    { id: 'overlay', label: 'Compact', key: '2' },
    { id: 'review', label: 'Review', key: '3' },
    { id: 'profile', label: 'Profile', key: '4' },
  ];
  return (
    <div data-testid="title-bar" style={{
      height: 44, flexShrink: 0,
      display: 'flex', alignItems: 'center',
      padding: '0 12px',
      borderBottom: '1px solid var(--line)',
      background: 'var(--bg-1)',
      position: 'relative',
    }}>
      {/* Traffic-ish dots (our own product, not macOS) */}
      <div style={{ display: 'flex', gap: 7, marginRight: 18, alignItems: 'center' }}>
        <span style={{ width: 11, height: 11, borderRadius: '50%', background: 'var(--line-strong)' }} />
        <span style={{ width: 11, height: 11, borderRadius: '50%', background: 'var(--line-strong)' }} />
        <span style={{ width: 11, height: 11, borderRadius: '50%', background: 'var(--line-strong)' }} />
      </div>

      {/* Brand */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginRight: 20 }}>
        <BrandMark />
        <div style={{ fontSize: 13, fontWeight: 600, letterSpacing: '-0.01em' }}>Talksmith</div>
      </div>

      {/* Screen tabs */}
      <div data-testid="screen-tabs" style={{ display: 'flex', gap: 2, background: 'var(--bg-inset)', padding: 2, borderRadius: 8, border: '1px solid var(--line-soft)' }}>
        {screens.map(s => (
          <button key={s.id} onClick={() => onScreenChange(s.id)}
            data-testid={`screen-tab-${s.id}`}
            aria-pressed={activeScreen === s.id}
            style={{
              border: 'none', background: activeScreen === s.id ? 'var(--bg-2)' : 'transparent',
              color: activeScreen === s.id ? 'var(--ink-0)' : 'var(--ink-2)',
              fontSize: 12, fontWeight: 500, padding: '4px 10px', borderRadius: 6,
              cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 6,
              boxShadow: activeScreen === s.id ? 'var(--shadow-card)' : 'none',
              transition: 'all var(--speed) var(--ease)',
            }}>
            {s.label}
            <span className="mono" style={{ fontSize: 9, color: 'var(--ink-3)', padding: '1px 4px', border: '1px solid var(--line)', borderRadius: 3 }}>⌘{s.key}</span>
          </button>
        ))}
      </div>

      {/* Center — meeting info */}
      <div style={{ flex: 1, display: 'flex', justifyContent: 'center', alignItems: 'center', gap: 10 }}>
        {meetingState && (
          <div style={{
            display: 'flex', alignItems: 'center', gap: 8,
            padding: '5px 10px',
            background: meetingState.recording ? 'var(--rose-soft)' : 'var(--bg-inset)',
            border: `1px solid ${meetingState.recording ? 'var(--rose-line)' : 'var(--line)'}`,
            borderRadius: 20, fontSize: 12,
          }}>
            {meetingState.recording ? (
              <>
                <span style={{
                  width: 7, height: 7, borderRadius: '50%',
                  background: 'var(--rose)', animation: 'pulseDot 1.4s ease-in-out infinite',
                }} />
                <span style={{ color: 'var(--rose)', fontWeight: 500 }}>Listening</span>
                <span style={{ color: 'var(--ink-2)' }}>·</span>
                <span data-testid="timecode" className="mono" style={{ color: 'var(--ink-1)' }}>{meetingState.timecode}</span>
              </>
            ) : (
              <>
                <span style={{ width: 7, height: 7, borderRadius: '50%', background: 'var(--ink-3)' }} />
                <span style={{ color: 'var(--ink-2)' }}>Idle</span>
              </>
            )}
          </div>
        )}
        {subtitle && (
          <div style={{ fontSize: 12, color: 'var(--ink-2)' }}>{subtitle}</div>
        )}
      </div>

      {/* Right */}
      <div style={{ display: 'flex', gap: 4 }}>
        <IconButton tip="Mute coaching (⌘M)">{I('bell', { size: 13 })}</IconButton>
        <span data-testid="settings-button">
          <IconButton tip="Settings" onClick={onSettings}>{I('settings', { size: 13 })}</IconButton>
        </span>
      </div>
    </div>
  );
}

function BrandMark({ size = 18 }) {
  return (
    <div style={{
      width: size, height: size, borderRadius: 5,
      background: 'var(--ink-0)', color: 'var(--bg-0)',
      display: 'grid', placeItems: 'center',
      fontFamily: 'var(--font-mono)', fontSize: size * 0.55, fontWeight: 600,
      letterSpacing: '-0.05em',
    }}>T</div>
  );
}

function IconButton({ children, tip, onClick, active, danger, size = 28 }) {
  const [hover, setHover] = React.useState(false);
  return (
    <button onClick={onClick} aria-label={tip} aria-pressed={active ? true : undefined}
      onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      title={tip} style={{
        width: size, height: size,
        display: 'grid', placeItems: 'center',
        background: active ? 'var(--bg-3)' : hover ? 'var(--bg-2)' : 'transparent',
        color: danger ? 'var(--rose)' : active ? 'var(--ink-0)' : 'var(--ink-1)',
        border: '1px solid transparent',
        borderColor: active ? 'var(--line)' : 'transparent',
        borderRadius: 7, cursor: 'pointer',
        transition: 'all var(--speed) var(--ease)',
      }}>{children}</button>
  );
}

function Kbd({ children }) {
  return (
    <span className="mono" style={{
      display: 'inline-flex', alignItems: 'center',
      fontSize: 10, padding: '1px 5px',
      background: 'var(--bg-inset)',
      border: '1px solid var(--line)',
      borderBottom: '2px solid var(--line-strong)',
      borderRadius: 4, color: 'var(--ink-1)',
      minWidth: 16, justifyContent: 'center',
    }}>{children}</span>
  );
}

function Panel({ title, eyebrow, right, children, style = {}, dense = false }) {
  return (
    <div style={{
      background: 'var(--bg-1)',
      border: '1px solid var(--line)',
      borderRadius: 'var(--radius-lg)',
      display: 'flex', flexDirection: 'column',
      overflow: 'hidden',
      ...style,
    }}>
      {(title || eyebrow) && (
        <div style={{
          display: 'flex', alignItems: 'center',
          padding: dense ? '10px 14px' : '14px 16px',
          borderBottom: '1px solid var(--line-soft)',
          gap: 10, flexShrink: 0,
        }}>
          {eyebrow && <span className="eyebrow">{eyebrow}</span>}
          {title && <div style={{ fontSize: 13, fontWeight: 600, letterSpacing: '-0.01em' }}>{title}</div>}
          <div style={{ flex: 1 }} />
          {right}
        </div>
      )}
      <div style={{ flex: 1, minHeight: 0, display: 'flex', flexDirection: 'column' }}>{children}</div>
    </div>
  );
}

// Tiny meter bar
function Meter({ value, max = 100, color = 'var(--ink-1)', height = 4, bg = 'var(--line-soft)', animated = true }) {
  return (
    <div style={{
      width: '100%', height, background: bg, borderRadius: height/2, overflow: 'hidden',
    }}>
      <div style={{
        width: `${Math.min(100, (value/max)*100)}%`, height: '100%',
        background: color, borderRadius: height/2,
        transition: animated ? 'width 600ms var(--ease)' : 'none',
      }} />
    </div>
  );
}

function Confidence({ level = 0.82 }) {
  // tiny 4-bar confidence meter
  const bars = [0.25, 0.5, 0.75, 1.0];
  return (
    <div style={{ display: 'inline-flex', alignItems: 'flex-end', gap: 1.5, height: 10 }}
         title={`Confidence ${Math.round(level*100)}%`}>
      {bars.map((b, i) => (
        <span key={i} style={{
          width: 2, height: 3 + i*2, borderRadius: 1,
          background: level >= b ? 'var(--ink-1)' : 'var(--line-strong)',
        }}/>
      ))}
    </div>
  );
}

function Chip({ children, tone = 'neutral', size = 'md' }) {
  const tones = {
    neutral: { bg: 'var(--bg-inset)', color: 'var(--ink-1)', border: 'var(--line)' },
    blue: { bg: 'var(--blue-soft)', color: 'var(--blue)', border: 'var(--blue-line)' },
    amber: { bg: 'var(--amber-soft)', color: 'var(--amber)', border: 'var(--amber-line)' },
    rose: { bg: 'var(--rose-soft)', color: 'var(--rose)', border: 'var(--rose-line)' },

function fmtTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
}

// Hook — returns current meeting simulation state.
// Heavy derivations (transcript slice, nudge windows, metrics) are memoized
// on boundary indices so they only recompute when something actually changed —
// not on every 100ms tick. This keeps each tick at near-zero CPU outside of
// transcript/nudge transitions.
function useMeetingSim({ running, speed = 1, startAt, activeGoal = 'listen', scenarioId = 'q2_roadmap' }) {
  // Resolve the scenario once per render. The inner names shadow the
  // module-level defaults so the existing references inside this hook
  // (SCRIPT, NUDGE_SCRIPT, PARTICIPANTS) keep working without rewrite.
  const scenario = SCENARIOS[scenarioId] || SCENARIOS.q2_roadmap;
  const SCRIPT = scenario.script;
  const NUDGE_SCRIPT = scenario.nudges;
  const PARTICIPANTS = scenario.participants;
  const TIMELINE_EVENTS = scenario.timeline;
  const totalDuration = scenario.duration;
  const effectiveStartAt = startAt != null ? startAt : (scenario.startAt ?? 0);

  const [t, setT] = React.useState(effectiveStartAt);
  // suppressed: id -> { mode: 'dismiss' } | { mode: 'snooze', until: number }.
  // Dismiss is permanent for the meeting; snooze hides the cue until t passes
  // `until`, then it becomes eligible to surface again.
  const [suppressed, setSuppressed] = React.useState(() => new Map());

  // Reset the clock and clear suppressed cues whenever the user picks a
  // different scenario. The stale-array fix lives in the memo deps below
  // (scenarioId is included so SCRIPT/NUDGE_SCRIPT changes are picked up);
  // this effect just snaps t back to the new scenario's startAt.
  const lastScenario = React.useRef(scenarioId);
  React.useEffect(() => {
    if (lastScenario.current !== scenarioId) {
      lastScenario.current = scenarioId;
      setT(effectiveStartAt);
      setSuppressed(new Map());
    }
  }, [scenarioId, effectiveStartAt]);

  React.useEffect(() => {
    if (!running) return;
    const id = setInterval(() => {
      setT(prev => {
        const next = prev + 0.1 * speed;
        if (next > totalDuration) {
          // Meeting looped — let suppressed cues come back so a re-watch isn't muted.
          setSuppressed(new Map());
          return 0;
        }
        return next;
      });
    }, 100);
    return () => clearInterval(id);
  }, [running, speed, totalDuration]);

  // Transcript: stable until we cross a script line boundary OR the user
  // swaps scenarios (which changes SCRIPT under our feet).
  const transcriptCount = React.useMemo(() => {
    let i = 0;
    while (i < SCRIPT.length && SCRIPT[i].t <= t) i++;
    return i;
  }, [t, scenarioId]);
  const transcript = React.useMemo(
    () => SCRIPT.slice(0, transcriptCount),
    [transcriptCount, scenarioId] // eslint-disable-line react-hooks/exhaustive-deps
  );

  // Candidate cues: window membership only changes at nudge t / t+duration
  // boundaries — and when the scenario changes (different nudge set).
  const candidateIds = React.useMemo(
    () => NUDGE_SCRIPT
      .filter(n => t >= n.t && t <= n.t + n.duration)
      .map(n => n.id)
      .join(','),
    [t, scenarioId]
  );
  const candidates = React.useMemo(
    () => NUDGE_SCRIPT.filter(n => {
      if (!(t >= n.t && t <= n.t + n.duration)) return false;
      const s = suppressed.get(n.id);
      if (!s) return true;
      if (s.mode === 'dismiss') return false;
      if (s.mode === 'snooze') return s.until <= t;
      return true;
    }),
    [candidateIds, suppressed, t, scenarioId] // eslint-disable-line react-hooks/exhaustive-deps
  );

  // Head coach: hard cap of 2 simultaneous cues. Priority = urgency tier
  // (rose > amber > blue > green) + confidence, modulated by active-goal
  // weights so the coach tied to your goal gets louder.
  const activeNudges = React.useMemo(() => {
    const toneRank = { rose: 300, amber: 200, blue: 100, green: 50 };
    const goalWeights = GOAL_COACH_WEIGHTS[activeGoal] || {};
    return candidates
      .map(n => ({
        n,
        score: (toneRank[n.tone] || 0)
             + n.confidence * 100
             + (goalWeights[n.coach] || 0) * 40,
      }))
      .sort((a, b) => b.score - a.score)
      .slice(0, 2)
      .map(x => x.n);
  }, [candidates, activeGoal]);

  // History grows only when t crosses a nudge's start time, or when the
  // scenario itself changes (different nudge set).
  const historyCount = React.useMemo(
    () => NUDGE_SCRIPT.filter(n => t >= n.t).length,
    [t, scenarioId]
  );
  const nudgeHistory = React.useMemo(
    () => NUDGE_SCRIPT.filter(n => t >= n.t).slice().reverse(),
    [historyCount, scenarioId] // eslint-disable-line react-hooks/exhaustive-deps
  );

  // Metrics: split heavy work. Language regex pass only re-runs when the
  // transcript itself grows; t-dependent curves recompute every tick but
  // are cheap arithmetic.
  const langCounts = React.useMemo(() => {
    let socio = 0;
    for (const l of transcript) {
      if (/\b(thanks|fair|got it|i hear you|yeah|i'm in|works for|sorry)\b/i.test(l.txt)) {
        socio++;
      }
    }
    return { socio, task: transcript.length - socio };
  }, [transcript]);

  const metrics = React.useMemo(
    () => deriveMetrics(transcript, t, langCounts, PARTICIPANTS),
    [transcript, t, langCounts, PARTICIPANTS]
  );

  // Default snooze: 2 minutes of meeting time, matching the head-coach
  // policy that no cue should re-fire faster than the user can change behavior.
  const SNOOZE_SECS = 120;

  return {
    t, setT,
    transcript,
    activeNudges,
    nudgeHistory,
    metrics,
    dismissNudge: (id) => setSuppressed(prev => {
      const next = new Map(prev); next.set(id, { mode: 'dismiss' }); return next;
    }),
    snoozeNudge: (id) => setSuppressed(prev => {
      const next = new Map(prev); next.set(id, { mode: 'snooze', until: t + SNOOZE_SECS }); return next;
    }),
    participants: PARTICIPANTS,
    timelineEvents: TIMELINE_EVENTS,
    totalDuration,
    scenario,
    tc: fmtTime(t),
  };
}

function deriveMetrics(transcript, t, langCounts, participants = PARTICIPANTS) {
  // Talk time per participant (approximated by words in their lines)
  const times = {};
  participants.forEach(p => times[p.id] = 0);
  transcript.forEach(l => {
    times[l.s] = (times[l.s] || 0) + l.txt.split(/\s+/).length * 0.35;
  });
  const total = Object.values(times).reduce((a, b) => a + b, 0) || 1;
  const talkRatio = participants.map(p => ({
    ...p,
    seconds: times[p.id],
    pct: Math.round((times[p.id] / total) * 100),
  }));

  // Interruption matrix — you→others and others→you
  // From the script, t=42 you cut Priya off at 43 (you→priya).
  let youInterruptedOthers = transcript.filter(l => l.interrupted && l.s !== 'you').length;
  let othersInterruptedYou = transcript.filter(l => l.interrupted && l.s === 'you').length;
  const interruptions = youInterruptedOthers + othersInterruptedYou;

  // Sentiment curve (synthetic but meeting-shaped)
  const sentiment = Math.max(0, Math.min(1,
    0.5
    + (t > 18 && t < 44 ? -0.1 : 0)
    + (t > 42 && t < 74 ? -0.18 : 0)
    + (t > 72 && t < 100 ? -0.22 : 0)
    + (t > 130 ? 0.2 : 0)
  ));

  // Engagement
  const recent = transcript.filter(l => l.t > t - 45);
  const uniqueSpeakers = new Set(recent.map(l => l.s)).size;
  const questions = recent.filter(l => l.txt.includes('?')).length;
  const engagement = Math.min(1, 0.3 + uniqueSpeakers * 0.15 + questions * 0.12);

  // Silence — gap since last line + contextual classification
  const last = transcript[transcript.length - 1];
  const silenceGap = last ? Math.max(0, t - last.t - last.txt.split(/\s+/).length * 0.35) : 0;
  // Context: if last line was a question, silence is "thinking" — healthy up to 6s
  const lastWasQuestion = last?.txt?.includes('?');
  const silenceContext = silenceGap < 1.5 ? 'flow'
    : lastWasQuestion ? (silenceGap < 6 ? 'thinking' : 'stalled')
    : (silenceGap < 3 ? 'pause' : 'dead-air');

  // Task vs relational utterance balance — passed in from the memoized
  // language pass so we don't re-scan the transcript every tick.
  const socio = langCounts ? langCounts.socio : 0;
  const task = langCounts ? langCounts.task : transcript.length;
  const ipaTaskRatio = transcript.length ? task / transcript.length : 0.5;
  const ipaDeviation = Math.abs(ipaTaskRatio - 0.65);

  // LSM (Linguistic Style Matching) — function-word overlap between You and others
  // Simulated smooth curve: high at start (monologue inflates), drops at 42 interrupt,
  // recovers at 102+ when you concede.
  const lsmBase = 0.72;
  const lsm = Math.max(0.42, Math.min(0.92,
    lsmBase
    + (t > 42 && t < 74 ? -0.22 : 0)
    + (t > 72 && t < 102 ? -0.15 : 0)
    + (t > 102 ? 0.12 : 0)
    + (t > 138 ? 0.05 : 0)
  ));

  // Audio quality — simulated dip around t=66–72 to demo low-confidence state
  const audioQuality = (t > 66 && t < 72) ? 0.38 : 0.94;

  // Acoustic tension (jitter/shimmer proxy) — spikes during interrupt + tense stretch
  const tension = Math.max(0, Math.min(1,
    0.22
    + (t > 42 && t < 50 ? 0.55 : 0)
    + (t > 72 && t < 92 ? 0.38 : 0)
    + (t > 130 ? -0.1 : 0)
  ));

  return {
    talkRatio, interruptions, sentiment, engagement, silenceGap, silenceContext,
    youInterruptedOthers, othersInterruptedYou,
    ipaTaskRatio, ipaDeviation,
    lsm,
    audioQuality,
    tension,
    yourTalkPct: talkRatio.find(p => p.id === 'you')?.pct ?? 0,
  };
}

};

function Nudge({ nudge, onDismiss, onSnooze, variant = 'card', compact = false }) {
  const [mounted, setMounted] = React.useState(false);
  React.useEffect(() => { setMounted(true); }, []);
  const [phraseOpen, setPhraseOpen] = React.useState(false);
  const [copied, setCopied] = React.useState(false);

  const tone = nudge.tone || 'blue';
  const toneColor = `var(--${tone})`;
  const toneBg = `var(--${tone}-soft)`;
  const toneLine = `var(--${tone}-line)`;
  const coach = nudge.coach ? MeetingData.COACHES[nudge.coach] : null;

  const copyPhrase = React.useCallback(() => {
    const phrase = nudge.action?.phrase;
    if (!phrase) return;
    // Strip the surrounding curly quotes the script uses for typographic flair
    // so the pasted phrase reads naturally in chat / docs.
    const plain = phrase.replace(/^["“]|["”]$/g, '');
    const done = () => { setCopied(true); setTimeout(() => setCopied(false), 1400); };
    if (navigator.clipboard?.writeText) {
      navigator.clipboard.writeText(plain).then(done, done);
    } else {
      done();
    }
  }, [nudge.action]);

  if (variant === 'pill') {
    return (
      <div style={{
        display: 'inline-flex', alignItems: 'center', gap: 8,
        padding: '6px 10px 6px 8px',
        background: toneBg,
        border: `1px solid ${toneLine}`,
        borderRadius: 999,
        animation: 'fadeUp 300ms var(--ease) both',
        maxWidth: 420,

        <span style={{
          width: 6, height: 6, borderRadius: '50%', background: toneColor,
          animation: 'pulseDot 1.6s ease-in-out infinite', flexShrink: 0,

          <button onClick={() => setPhraseOpen(p => !p)} style={{
            border: 'none', background: 'transparent', color: toneColor,
            fontSize: 11, fontWeight: 500, cursor: 'pointer', padding: 0,
          }}>{nudge.action.label} →</button>
        )}
        <button onClick={() => onDismiss?.(nudge.id)} aria-label="Dismiss cue" title="Dismiss" style={{
          border: 'none', background: 'transparent', color: 'var(--ink-2)',
          cursor: 'pointer', padding: 0, display: 'grid', placeItems: 'center',
        }}>{I('x', { size: 11 })}</button>
      </div>
    );
  }

  if (variant === 'inline') {
    return (
      <div style={{
        display: 'flex', gap: 10,
        padding: '10px 12px',
        borderLeft: `2px solid ${toneColor}`,
        background: toneBg,
        animation: 'fadeUp 300ms var(--ease) both',
      }}>
        <div style={{ flex: 1 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 3 }}>
            {coach && (
              <span style={{ fontSize: 10.5, fontWeight: 500, color: toneColor }}>
                {coach.name}
              </span>
            )}
            <span style={{ color: 'var(--ink-3)', fontSize: 10 }}>·</span>
            <span className="eyebrow" style={{ color: 'var(--ink-2)' }}>{nudge.type}</span>
            <Confidence level={nudge.confidence} />
          </div>
          <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 2 }}>{nudge.title}</div>
          <div style={{ fontSize: 12, color: 'var(--ink-1)' }}>{nudge.detail}</div>
          {nudge.action && (
            <button onClick={() => setPhraseOpen(p => !p)} style={{
              marginTop: 6, border: 'none', background: 'transparent',
              color: toneColor, fontSize: 11, fontWeight: 500,
              cursor: 'pointer', padding: 0,
            }}>{nudge.action.label} →</button>
          )}
          {phraseOpen && nudge.action?.phrase && (
            <div style={{
              marginTop: 6, padding: '8px 10px',
              background: 'var(--bg-2)', border: '1px solid var(--line)',
              borderRadius: 6, fontStyle: 'italic', fontSize: 12, color: 'var(--ink-0)',
            }}>{nudge.action.phrase}</div>
          )}
        </div>
        <button onClick={() => onDismiss?.(nudge.id)} aria-label="Dismiss cue" title="Dismiss" style={{
          border: 'none', background: 'transparent', color: 'var(--ink-2)',
          cursor: 'pointer', padding: 0, alignSelf: 'flex-start',
        }}>{I('x', { size: 12 })}</button>
      </div>
    );
  }

  return (
    <div style={{
      background: 'var(--bg-2)',
      border: `1px solid ${toneLine}`,
      borderRadius: 'var(--radius)',
      overflow: 'hidden',
      animation: 'fadeUp 320ms var(--ease) both',
      boxShadow: 'var(--shadow-card)',
      position: 'relative',
    }}>
      <div style={{
        position: 'absolute', left: 0, top: 0, bottom: 0, width: 3,

      }} />
      <div style={{ padding: '11px 13px 11px 14px' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
          <span style={{
            width: 7, height: 7, borderRadius: '50%', background: toneColor,
            animation: nudge.positive ? 'none' : 'pulseDot 1.6s ease-in-out infinite',
          }} />
          {coach && (
            <span style={{
              fontSize: 10.5, fontWeight: 500, color: toneColor,
              fontFamily: 'var(--font-sans)', letterSpacing: '-0.005em',
            }}>{coach.name}</span>
          )}
          <span style={{ color: 'var(--ink-3)', fontSize: 10 }}>·</span>
          <span className="eyebrow" style={{ color: 'var(--ink-2)' }}>{nudge.type}</span>

          {nudge.detail}

        {!compact && nudge.signals && (
          <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap', marginTop: 8 }}>
            {nudge.signals.map((s, i) => (

                border: '1px solid var(--line-soft)', borderRadius: 4,
                fontFamily: 'var(--font-mono)',
              }}>{s}</span>
            ))}
          </div>
        )}

        {/* Why this nudge — counterfactual explainer */}
        {!compact && nudge.why && (
          <div style={{
            marginTop: 8,
            padding: '7px 9px',
            background: 'transparent',
            borderLeft: `1.5px solid ${toneLine}`,
            fontSize: 11.5, color: 'var(--ink-2)', lineHeight: 1.45,
          }}>
            <span className="eyebrow" style={{ marginRight: 6, color: toneColor }}>Why</span>
            {nudge.why}
          </div>
        )}

        {/* Phrase reveal */}
        {phraseOpen && nudge.action?.phrase && (
          <div style={{
            marginTop: 8, padding: '9px 11px',
            background: 'var(--bg-inset)',
            border: '1px solid var(--line)',
            borderRadius: 6,
            fontSize: 12.5, color: 'var(--ink-0)',
            fontStyle: 'italic',
            animation: 'fadeUp 200ms var(--ease) both',
            position: 'relative',
          }}>
            <div style={{ display: 'flex', alignItems: 'center', marginBottom: 3 }}>

                fontSize: 10.5, fontWeight: 500, padding: '2px 4px', cursor: 'pointer',
                fontFamily: 'inherit', fontStyle: 'normal',
                display: 'inline-flex', alignItems: 'center', gap: 4,
                transition: 'color var(--speed)',
              }}>
                {I(copied ? 'check' : 'copy', { size: 11 })}
                {copied ? 'Copied' : 'Copy'}
              </button>
            </div>
            {nudge.action.phrase}
          </div>
        )}

        {/* Actions */}
        <div style={{
          display: 'flex', alignItems: 'center', gap: 6,
          marginTop: 10, paddingTop: 10, borderTop: '1px solid var(--line-soft)',
        }}>
          {nudge.action && (
            <button onClick={() => setPhraseOpen(p => !p)} style={{
              border: `1px solid ${toneLine}`,
              background: toneBg, color: toneColor,
              fontSize: 11.5, fontWeight: 500,
              padding: '4px 10px', borderRadius: 5,
              cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 4,
              transition: 'all var(--speed) var(--ease)',
            }}>

            </button>
          )}
          <div style={{ flex: 1 }} />
          <button onClick={() => onSnooze?.(nudge.id)} style={{
            border: 'none', background: 'transparent', color: 'var(--ink-2)',
            fontSize: 11, cursor: 'pointer', padding: '3px 6px', borderRadius: 4,
            display: 'flex', alignItems: 'center', gap: 4,
          }} title="Snooze 2m">
            {I('snooze', { size: 12 })} Snooze

          <button onClick={() => onDismiss?.(nudge.id)} style={{
            border: 'none', background: 'transparent', color: 'var(--ink-2)',
            fontSize: 11, cursor: 'pointer', padding: '3px 6px', borderRadius: 4,
            display: 'flex', alignItems: 'center', gap: 4,
          }} title="Dismiss">
            {I('x', { size: 12 })} Dismiss
          </button>
        </div>
      </div>
    </div>
  );
}

function Transcript({ transcript, participants, t }) {
  const scrollRef = React.useRef();
  React.useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [transcript.length]);

  const p = (id) => participants.find(x => x.id === id);
  const last = transcript[transcript.length - 1];
  const currentSpeaker = last ? p(last.s) : null;

  return (
    <div ref={scrollRef} className="scroll" style={{
      flex: 1, overflowY: 'auto',
      padding: '8px 16px 16px', minHeight: 0,
    }}>
      {transcript.map((l, i) => {
        const prev = transcript[i-1];
        const showSpeaker = !prev || prev.s !== l.s;
        const speaker = p(l.s);
        const isYou = l.s === 'you';
        const isCurrent = i === transcript.length - 1;
        return (
          <div key={i} style={{
            marginTop: showSpeaker ? 12 : 2,
            animation: isCurrent ? 'fadeUp 280ms var(--ease) both' : 'none',
          }}>
            {showSpeaker && (
              <div style={{ display: 'flex', alignItems: 'center', gap: 7, marginBottom: 4 }}>
                <span style={{
                  width: 18, height: 18, borderRadius: 4,
                  background: speaker.color, opacity: 0.25,
                  border: `1px solid ${speaker.color}`,
                  display: 'grid', placeItems: 'center',
                  fontSize: 9, fontWeight: 600, color: speaker.color,
                  fontFamily: 'var(--font-mono)',
                }}>{speaker.initials}</span>
                <span style={{
                  fontSize: 11.5, fontWeight: 600, color: isYou ? 'var(--ink-0)' : 'var(--ink-1)',
                }}>{speaker.name}</span>
                <span className="mono" style={{ fontSize: 10, color: 'var(--ink-3)' }}>
                  {MeetingData.fmtTime(l.t)}
                </span>
                {l.interrupted && (
                  <Chip tone="rose" size="sm">interrupted</Chip>
                )}
              </div>
            )}
            <div style={{
              fontSize: 13, lineHeight: 1.55,
              color: isYou ? 'var(--ink-0)' : 'var(--ink-1)',
              paddingLeft: 25,
              textWrap: 'pretty',
            }}>
              {l.txt}
              {isCurrent && <TypingCaret />}

          </div>
        );
      })}
      {transcript.length === 0 && (
        <div style={{ padding: 20, textAlign: 'center', color: 'var(--ink-3)', fontSize: 12 }}>
          Waiting for audio…
        </div>
      )}
    </div>
  );

      <HighAlertFrame active={highAlert && !muted} />

      {/* LEFT — Transcript */}
      <Panel
        eyebrow="Transcript"
        title="Live"
        dense
        right={
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            {running ? (
              <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                <LevelBars active />
                <span className="mono" style={{ fontSize: 10.5, color: 'var(--ink-2)' }}>
                  {sim.participants.find(p => p.id === sim.transcript[sim.transcript.length-1]?.s)?.name || '—'}
                </span>
              </div>
            ) : (
              <span className="mono" style={{ fontSize: 10.5, color: 'var(--ink-3)' }}>Paused</span>
            )}
          </div>
        }
      >
        <Transcript transcript={sim.transcript} participants={sim.participants} t={sim.t}/>
      </Panel>

      {/* CENTER — Guidance, from the head coach */}
      <Panel
        eyebrow="Guidance"
        title="Head coach"
        dense
        right={
          <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
            <IconButton tip={running ? 'Pause (Space)' : 'Resume (Space)'} onClick={onToggleRun}>
              {running ? I('pause', { size: 12 }) : I('play', { size: 12 })}
            </IconButton>
            <button onClick={() => onSpeed(speed === 1 ? 2 : speed === 2 ? 4 : 1)}
              className="mono"
              style={{
                border: '1px solid var(--line)', background: 'var(--bg-inset)',
                color: 'var(--ink-1)', fontSize: 10.5, padding: '3px 6px',
                borderRadius: 5, cursor: 'pointer', minWidth: 28,
              }}>{speed}×</button>
            <IconButton tip="Mute coaching (⌘M)" onClick={onToggleMute} active={muted} danger={muted}>
              {muted ? I('bellOff', { size: 12 }) : I('bell', { size: 12 })}
            </IconButton>
          </div>
        }
      >
        <GuidanceStream
          active={sim.activeNudges}
          history={sim.nudgeHistory}
          onDismiss={sim.dismissNudge}
          onSnooze={sim.snoozeNudge}
          variant={variant}
          muted={muted}
        />
      </Panel>

      {/* RIGHT — Dynamics */}
      <Panel eyebrow="Dynamics" title="Live" dense
        right={sim.metrics.audioQuality < 0.6 ? (
          <span style={{
            fontSize: 10.5, padding: '3px 7px',
            background: 'var(--bg-inset)', border: '1px dashed var(--line)',
            borderRadius: 999, color: 'var(--ink-2)',
            display: 'inline-flex', alignItems: 'center', gap: 4,
          }}>
            <span style={{ width:5, height:5, borderRadius:'50%', background:'var(--amber)' }}/>
            low audio
          </span>
        ) : null}
      >
        <div className="scroll" style={{ flex: 1, overflowY: 'auto', padding: 14, display: 'flex', flexDirection: 'column', gap: 18, minHeight: 0 }}>
          {/* Listening coach — your talk/silence balance */}
          <CoachBlock name="Listening coach" scope="watching you">
            <div>
              <div style={{ display: 'flex', alignItems: 'center', marginBottom: 8 }}>
                <span className="eyebrow">Speaking time</span>
                <div style={{ flex: 1 }}/>
                {sim.metrics.yourTalkPct > 60 && (
                  <Chip tone="amber" size="sm">above balance</Chip>
                )}
              </div>
              <TalkRatioBar participants={sim.metrics.talkRatio}/>
            </div>
            <div>
              <div style={{ display:'flex', alignItems:'center', marginBottom: 6 }}>
                <span className="eyebrow">Silence after points</span>
                <div style={{flex:1}}/>
                <span className="mono" style={{ fontSize: 10.5, color: 'var(--ink-2)' }}>
                  {sim.metrics.silenceContext}
                </span>
              </div>
              <SilenceBar gap={sim.metrics.silenceGap} context={sim.metrics.silenceContext}/>
            </div>
          </CoachBlock>

          {/* Team dynamics coach — group health */}
          <CoachBlock name="Team dynamics coach" scope="watching the group">
            <div>
              <div className="eyebrow" style={{ marginBottom: 6 }}>Who's talking over whom</div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 6 }}>
                <InterruptCell
                  label="you → others"
                  value={sim.metrics.youInterruptedOthers}
                  tone={sim.metrics.youInterruptedOthers > 0 ? 'rose' : 'neutral'}
                />
                <InterruptCell
                  label="others → you"
                  value={sim.metrics.othersInterruptedYou}
                  tone="neutral"
                />
              </div>
            </div>
            <MetricTile
              label="Engagement"
              value={Math.round(sim.metrics.engagement * 100)}
              suffix="/100"
              hint="3 speakers · active"
              color={sim.metrics.engagement > 0.6 ? 'var(--green)' : 'var(--ink-0)'}
            />
          </CoachBlock>

          {/* Tone coach — room temperature + alignment */}
          <CoachBlock name="Tone coach" scope="watching the room">
            <div>
              <div className="eyebrow" style={{ marginBottom: 6 }}>Room temperature</div>
              <SentimentGauge value={sim.metrics.sentiment}/>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
              <div style={{
                padding: '10px 11px', background: 'var(--bg-2)',
                border: '1px solid var(--line-soft)', borderRadius: 8,
              }}>
                <div className="eyebrow" style={{ marginBottom: 4 }}>Alignment</div>
                <div style={{ display: 'flex', alignItems: 'baseline', gap: 4 }}>
                  <span className="mono" style={{ fontSize: 18, fontWeight: 600,
                    color: sim.metrics.lsm < 0.55 ? 'var(--rose)' : sim.metrics.lsm > 0.75 ? 'var(--green)' : 'var(--ink-0)',
                    letterSpacing:'-0.02em',
                  }}>{sim.metrics.lsm.toFixed(2)}</span>
                </div>
                <div style={{ marginTop: 6 }}>
                  <Meter value={sim.metrics.lsm * 100} color={sim.metrics.lsm < 0.55 ? 'var(--rose)' : 'var(--blue)'} height={3}/>
                </div>
                <div style={{ fontSize: 10.5, color: 'var(--ink-2)', marginTop: 5 }}>
                  {sim.metrics.lsm < 0.55 ? 'misaligned' : sim.metrics.lsm > 0.75 ? 'in sync' : 'matching'}
                </div>
              </div>
              <MetricTile
                label="Pace"
                value={Math.round(142 + sim.metrics.tension * 26)}
                suffix="wpm"
                hint="baseline 142"
                color={sim.metrics.tension > 0.5 ? 'var(--amber)' : 'var(--ink-0)'}
              />
            </div>
          </CoachBlock>

          {/* Outcomes coach — meeting arc */}
          <CoachBlock name="Outcomes coach" scope="watching the arc">
            <div>
              <div className="eyebrow" style={{ marginBottom: 8 }}>Meeting goals</div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                <GoalRow label="Speak less than 50%" current={sim.metrics.yourTalkPct} target={50} invert/>
                <GoalRow label="Ask ≥ 3 questions" current={Math.floor(sim.t / 60)} target={3}/>
                <GoalRow label="Acknowledge objections" current={sim.t > 102 ? 1 : 0} target={2}/>
              </div>
            </div>
          </CoachBlock>

          {/* Head coach — graceful degradation */}
          {sim.metrics.audioQuality < 0.6 && (
            <div style={{
              padding: '9px 11px', background: 'var(--bg-inset)',
              border: '1px dashed var(--amber-line)', borderRadius: 6,
              display: 'flex', gap: 8, alignItems: 'flex-start',
            }}>
              <span style={{ color: 'var(--amber)', marginTop: 1 }}>{I('info', { size: 12 })}</span>
              <div style={{ fontSize: 11, color: 'var(--ink-1)', lineHeight: 1.4 }}>
                <div style={{ fontWeight: 600, color: 'var(--ink-0)', marginBottom: 2 }}>Head coach paused the team</div>
                Low audio quality — multi-speaker overlap detected. Cues resume once signal stabilizes.
              </div>
            </div>
          )}
        </div>
      </Panel>
    </div>
  );
}

function GoalRow({ label, current, target, invert = false }) {
  const ratio = invert
    ? Math.max(0, 1 - current / target)
    : Math.min(1, current / target);
  const done = invert ? current <= target : current >= target;
  return (
    <div>
      <div style={{ display: 'flex', fontSize: 11.5, marginBottom: 3 }}>
        <span style={{ flex: 1, color: 'var(--ink-1)' }}>{label}</span>
        <span className="mono" style={{ color: done ? 'var(--green)' : 'var(--ink-2)' }}>
          {current}{invert ? '%' : ''} / {target}{invert ? '%' : ''}
        </span>
      </div>
      <Meter value={ratio * 100} color={done ? 'var(--green)' : 'var(--blue)'} height={3}/>
    </div>
  );
}

// Groups a set of dynamics metrics under a named coach persona.
function CoachBlock({ name, scope, children }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
      <div style={{
        display: 'flex', alignItems: 'baseline', gap: 8,
        paddingBottom: 6, borderBottom: '1px solid var(--line-soft)',
      }}>
        <span style={{ fontSize: 11.5, fontWeight: 600, color: 'var(--ink-0)', letterSpacing: '-0.01em' }}>
          {name}
        </span>
        <span style={{ fontSize: 10, color: 'var(--ink-3)', fontFamily: 'var(--font-mono)' }}>
          {scope}
        </span>
      </div>
      {children}
    </div>
  );
}

function InterruptCell({ label, value, tone }) {
  const color = tone === 'rose' ? 'var(--rose)' : 'var(--ink-0)';
  return (
    <div style={{
      padding: '8px 10px', background: 'var(--bg-2)',
      border: '1px solid var(--line-soft)', borderRadius: 7,
    }}>
      <div style={{ fontSize: 10, color: 'var(--ink-2)', marginBottom: 2, fontFamily: 'var(--font-mono)' }}>{label}</div>
      <div style={{ display: 'flex', alignItems: 'baseline', gap: 4 }}>
        <span className="mono" style={{
          fontSize: 18, fontWeight: 600, color, letterSpacing: '-0.02em',
        }}>{value}</span>
        <span style={{ fontSize: 10, color: 'var(--ink-3)' }}>{value === 1 ? 'event' : 'events'}</span>
      </div>
    </div>
  );
}

function SilenceBar({ gap, context }) {
  // 0–6s visual; color by context
  const pct = Math.min(100, (gap / 6) * 100);
  const color =
    context === 'dead-air' ? 'var(--amber)' :
    context === 'stalled'  ? 'var(--amber)' :
    context === 'thinking' ? 'var(--blue)' :
    context === 'pause'    ? 'var(--ink-2)' :
                             'var(--ink-3)';
  return (
    <div>
      <div style={{
        position: 'relative', height: 6, borderRadius: 3, overflow: 'hidden',
        background: 'var(--bg-inset)', border: '1px solid var(--line-soft)',
      }}>
        <div style={{
          position: 'absolute', inset: 0, width: pct + '%', background: color,
          transition: 'width 300ms var(--ease), background 300ms var(--ease)',
        }}/>
      </div>
      <div style={{ display: 'flex', marginTop: 4, fontSize: 10, color: 'var(--ink-2)' }} className="mono">
        <span>{gap.toFixed(1)}s</span>
        <div style={{ flex: 1 }}/>
        <span>dead-air &gt; 4s</span>
      </div>
    </div>
  );
}

// === components/Review.jsx ===
// Review.jsx — Post-meeting review screen
// Timeline scrub + synced transcript/insights + suggestions + scores

function Review({ playing, onTogglePlay, t, setT, sim }) {
  const total = sim.totalDuration;
  const events = sim.timelineEvents;

  // Playback tick
  React.useEffect(() => {
    if (!playing) return;
    const iv = setInterval(() => {
      setT(prev => prev + 0.1 > total ? 0 : prev + 0.1);
    }, 100);
    return () => clearInterval(iv);
  }, [playing, total]);

  // Nudges up to current time for the insight column
  const insightsUpTo = MeetingData.NUDGE_SCRIPT.filter(n => n.t <= t);
  const currentInsight = insightsUpTo[insightsUpTo.length - 1];

  return (
    <div style={{
      flex: 1, display: 'grid',
      gridTemplateColumns: '1.1fr 1.2fr 1.1fr',
      gridTemplateRows: 'auto 1fr',
      gap: 14, padding: 14, minHeight: 0,
    }}>
      {/* Top bar: scores */}
      <div style={{ gridColumn: '1 / -1' }}>
        <ScoreBar metrics={deriveFinalScores(sim)}/>
      </div>

      {/* LEFT — Transcript synced */}
      <Panel eyebrow="Recording" title="Synced transcript" dense
        right={
          <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
            <IconButton size={26} tip={playing ? 'Pause' : 'Play'} onClick={onTogglePlay}>
              {playing ? I('pause', { size: 11 }) : I('play', { size: 11 })}
            </IconButton>
            <span className="mono" style={{ fontSize: 10.5, color: 'var(--ink-2)' }}>
              {MeetingData.fmtTime(t)} / {MeetingData.fmtTime(total)}
            </span>
          </div>
        }>
        <SyncedTranscript t={t} setT={setT}/>
      </Panel>

      {/* CENTER — Timeline + Insight */}
      <Panel eyebrow="Key moments" title="Timeline" dense>
        <Timeline events={events} total={total} t={t} setT={setT}/>
        <div style={{ padding: '10px 14px 14px', flex: 1, display: 'flex', flexDirection: 'column', gap: 10, overflowY: 'auto' }} className="scroll">
          {currentInsight ? (
            <CurrentInsight nudge={currentInsight}/>
          ) : (
            <div style={{ padding: 20, color: 'var(--ink-2)', fontSize: 12, textAlign: 'center' }}>
              Scrub to a flagged moment to see the coaching insight captured there.
            </div>
          )}

          <div>
            <div className="eyebrow" style={{ marginBottom: 8 }}>All moments</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
              {events.map((e, i) => (
                <button key={i} onClick={() => setT(e.t)} style={{
                  display: 'flex', alignItems: 'center', gap: 8,
                  padding: '7px 9px', borderRadius: 6,
                  background: Math.abs(t - e.t) < 1 ? 'var(--bg-2)' : 'transparent',
                  border: '1px solid transparent',
                  borderColor: Math.abs(t - e.t) < 1 ? 'var(--line)' : 'transparent',
                  color: 'var(--ink-1)', cursor: 'pointer', textAlign: 'left',
                  width: '100%', fontFamily: 'inherit',
                  transition: 'all var(--speed)',
                }}>
                  <span style={{ width: 5, height: 5, borderRadius: '50%', background: `var(--${e.tone})` }}/>
                  <span style={{ flex: 1, fontSize: 12 }}>{e.label}</span>
                  <span className="mono" style={{ fontSize: 10.5, color: 'var(--ink-3)' }}>
                    {MeetingData.fmtTime(e.t)}
                  </span>
                </button>
              ))}
            </div>
          </div>
        </div>
      </Panel>

      {/* RIGHT — "What you could have said" */}
      <Panel eyebrow="Coaching" title="What you could have said" dense>
        <div className="scroll" style={{ flex: 1, overflowY: 'auto', padding: '10px 14px 14px', display: 'flex', flexDirection: 'column', gap: 10 }}>
          {MeetingData.NUDGE_SCRIPT.filter(n => n.action).map(n => (
            <CoachCard key={n.id} nudge={n} active={Math.abs(t - n.t) < 3} onJump={() => setT(n.t)}/>
          ))}

          <div style={{
            marginTop: 6,
            padding: 12,
            background: 'var(--bg-inset)',
            border: '1px solid var(--line-soft)',
            borderRadius: 8,
            display: 'flex', gap: 10,
          }}>
            <span style={{ color: 'var(--blue)', marginTop: 1 }}>{I('info', { size: 14 })}</span>
            <div style={{ fontSize: 11.5, color: 'var(--ink-1)', lineHeight: 1.5 }}>
              Talksmith's suggestions are generated by comparing your patterns to high-influence meetings
              you've previously tagged as successful. Each is <b>explainable</b> — hover any score to see
              the contributing signals.
            </div>
          </div>
        </div>
      </Panel>
    </div>
  );
}

function deriveFinalScores(sim) {
  return {
    talkRatio: 62,   // you
    clarity: 78,
    influence: 64,
    listening: 54,
    interruptions: 2,
    duration: 175,
  };
}

function ScoreBar({ metrics }) {

function SyncedTranscript({ t, setT }) {
  const scrollRef = React.useRef();
  const activeRef = React.useRef();
  const activeIdx = MeetingData.SCRIPT.findLastIndex(l => l.t <= t);

  React.useEffect(() => {
    if (activeRef.current && scrollRef.current) {
      const el = activeRef.current;
      const parent = scrollRef.current;
      parent.scrollTop = el.offsetTop - parent.offsetHeight / 2 + el.offsetHeight / 2;
    }
  }, [activeIdx]);

  return (
    <div ref={scrollRef} className="scroll" style={{
      flex: 1, overflowY: 'auto', padding: '8px 16px 14px', minHeight: 0,
    }}>
      {MeetingData.SCRIPT.map((l, i) => {
        const speaker = MeetingData.PARTICIPANTS.find(p => p.id === l.s);
        const active = i === activeIdx;
        const past = l.t < t;
        return (
          <div key={i} ref={active ? activeRef : null}
               onClick={() => setT(l.t)}
               style={{
                 padding: '8px 10px',
                 margin: '2px 0',
                 borderRadius: 6,
                 background: active ? 'var(--bg-2)' : 'transparent',
                 border: '1px solid transparent',
                 borderColor: active ? 'var(--line)' : 'transparent',
                 cursor: 'pointer',
                 opacity: past ? 1 : 0.45,
                 transition: 'all var(--speed)',
               }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 3 }}>
              <span style={{ width: 5, height: 5, borderRadius: '50%', background: speaker.color }}/>
              <span style={{ fontSize: 11, fontWeight: 600, color: l.s === 'you' ? 'var(--ink-0)' : 'var(--ink-1)' }}>
                {speaker.name}
              </span>
              <span className="mono" style={{ fontSize: 10, color: 'var(--ink-3)' }}>
                {MeetingData.fmtTime(l.t)}
              </span>
              {l.interrupted && <Chip tone="rose" size="sm">interrupted</Chip>}
            </div>
            <div style={{ fontSize: 12.5, color: active ? 'var(--ink-0)' : 'var(--ink-1)', lineHeight: 1.5, paddingLeft: 11, textWrap: 'pretty' }}>
              {l.txt}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function Timeline({ events, total, t, setT }) {
  const barRef = React.useRef();
  const handleClick = (e) => {
    const rect = barRef.current.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    setT(Math.max(0, Math.min(total, pct * total)));
  };
  // Synthetic waveform
  const bars = React.useMemo(() => Array.from({ length: 120 }, (_, i) => {
    const speechHeight = 0.3 + 0.7 * Math.abs(Math.sin(i * 0.43) * Math.cos(i * 0.19 + 1.3));
    return speechHeight;
  }), []);

  return (
    <div style={{ padding: '12px 14px 10px', borderBottom: '1px solid var(--line-soft)' }}>
      {/* Speaker lanes */}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 3, marginBottom: 8 }}>
        {MeetingData.PARTICIPANTS.map(p => {
          const segments = MeetingData.SCRIPT.filter(l => l.s === p.id).map(l => ({
            start: l.t / total * 100,
            width: Math.min(100, (l.txt.split(/\s+/).length * 0.35) / total * 100),
          }));
          return (
            <div key={p.id} style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
              <span style={{
                width: 28, fontSize: 9.5, color: 'var(--ink-2)',
                fontFamily: 'var(--font-mono)',
              }}>{p.initials}</span>
              <div style={{
                position: 'relative', flex: 1, height: 6,
                background: 'var(--bg-inset)', borderRadius: 3,
              }}>
                {segments.map((seg, i) => (
                  <div key={i} style={{
                    position: 'absolute', left: `${seg.start}%`, width: `${seg.width}%`,
                    top: 0, bottom: 0, background: p.color, opacity: 0.5, borderRadius: 2,
                  }}/>
                ))}
              </div>
            </div>
          );
        })}
      </div>

      {/* Waveform + events */}
      <div ref={barRef} onClick={handleClick} style={{
        position: 'relative', height: 44, cursor: 'pointer',
        background: 'var(--bg-inset)', borderRadius: 6,
        padding: '6px 4px',
        userSelect: 'none',
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 1, height: '100%' }}>
          {bars.map((h, i) => {
            const atT = (i / bars.length) * total;
            const past = atT <= t;
            return (
              <div key={i} style={{
                flex: 1, height: `${h * 100}%`,
                background: past ? 'var(--ink-1)' : 'var(--line-strong)',
                borderRadius: 0.5,
                transition: 'background var(--speed)',
              }}/>
            );
          })}
        </div>

        {/* Event flags */}
        {events.map((e, i) => (
          <div key={i} onClick={(ev) => { ev.stopPropagation(); setT(e.t); }}
               style={{
                 position: 'absolute', left: `${(e.t / total) * 100}%`,
                 top: -3, bottom: -3,
                 width: 2, background: `var(--${e.tone})`,
                 transform: 'translateX(-50%)',
                 cursor: 'pointer',
               }}
               title={`${e.label} · ${MeetingData.fmtTime(e.t)}`}>
            <div style={{
              position: 'absolute', top: -5, left: '50%', transform: 'translateX(-50%)',
              width: 8, height: 8, borderRadius: '50%',
              background: `var(--${e.tone})`, border: '2px solid var(--bg-1)',
            }}/>
          </div>
        ))}

        {/* Playhead */}
        <div style={{
          position: 'absolute', left: `${(t / total) * 100}%`,
          top: -4, bottom: -4, width: 2,
          background: 'var(--ink-0)', transform: 'translateX(-50%)',
          pointerEvents: 'none',
        }}>
          <div style={{
            position: 'absolute', top: -6, left: '50%', transform: 'translateX(-50%)',
            width: 10, height: 10, background: 'var(--ink-0)', borderRadius: 2,
          }}/>
        </div>
      </div>

      <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 5, fontSize: 10, color: 'var(--ink-3)', fontFamily: 'var(--font-mono)' }}>
        <span>00:00</span>
        <span>{MeetingData.fmtTime(total / 2)}</span>
        <span>{MeetingData.fmtTime(total)}</span>
      </div>
    </div>
  );
}
